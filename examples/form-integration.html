<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero WYSIWYG — Form Integration</title>
    <link rel="stylesheet" href="../src/zero-wysiwyg.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { margin-bottom: 8px; }
        p.desc { color: #666; margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .btn-submit { padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .btn-submit:hover { background: #1d4ed8; }
        .result { margin-top: 24px; padding: 20px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; display: none; }
        .result h3 { margin: 0 0 12px; color: #166534; }
        .result pre { white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; background: #fff; padding: 12px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Zero WYSIWYG — Form Integration</h1>
    <p class="desc">The editor syncs to a hidden &lt;textarea&gt;, so standard form submission just works. No extra JavaScript needed.</p>

    <form id="articleForm" onsubmit="return handleSubmit(event)">
        <div class="form-group">
            <label for="title">Article Title</label>
            <input type="text" id="title" name="title" value="My First Article" required>
        </div>

        <div class="form-group">
            <label for="body">Article Body</label>
            <textarea id="body" name="body" style="width:100%">
                <p>Write your article content here. The editor automatically keeps the textarea value in sync.</p>
                <p>When you submit the form, the HTML content is sent as a regular POST field.</p>
            </textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Article</button>
    </form>

    <div class="result" id="result">
        <h3>✅ Form Data (would be sent to server):</h3>
        <pre id="formData"></pre>
    </div>

    <script src="../src/zero-wysiwyg.js"></script>
    <script>
        ZeroWysiwyg.init('body', { height: '300px', wordCount: true, slashCommands: true });

        function handleSubmit(e) {
            e.preventDefault();
            var fd = new FormData(e.target);
            var data = {};
            fd.forEach(function(val, key) { data[key] = val; });
            document.getElementById('formData').textContent = JSON.stringify(data, null, 2);
            document.getElementById('result').style.display = 'block';
            return false;
        }
    </script>
</body>
</html>
